name: Build and Release IronLock

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure CMake
      run: cmake -B build -A x64

    - name: Build SDK
      run: cmake --build build --config Release

    - name: Prepare Release Artifacts
      shell: bash
      run: |
        mkdir -p release/include/IronLock
        cp build/Release/IronLock.lib release/
        cp include/IronLock/ProtectionSDK.h release/include/IronLock/
        cp include/IronLock/Obfuscation.h release/include/IronLock/
        # Include the compiler engine
        mkdir -p release/tools
        cp build/Release/ironlock-cl.exe release/tools/ || true
        # Zip artifacts
        cd release && 7z a ../IronLock-SDK.zip *

    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./IronLock-SDK.zip
        asset_name: IronLock-SDK.zip
        asset_content_type: application/zip
