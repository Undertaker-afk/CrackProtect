name: QA Validation

on:
  push:
  pull_request:

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r tests/qa/requirements.txt
      - name: Run QA framework
        run: |
          python tests/qa/run_qa.py --commit "${{ github.sha }}"
      - name: Upload QA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qa-artifacts
          path: artifacts/qa/
